name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Run the deploy job (Railway)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    name: ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync --frozen
      - name: Run ruff check
        run: uv run ruff check

  format:
    name: ruff format --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync --frozen
      - name: Check formatting
        run: uv run ruff format --check

  typecheck:
    name: mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync --frozen
      - name: Run mypy
        run: uv run mypy --strict src tests

  test:
    name: pytest
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: copier
          POSTGRES_PASSWORD: copier
          POSTGRES_DB: copier
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://copier:copier@localhost:5432/copier
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Sync deps (non-editable so migrations force-include runs)
        # --no-editable makes uv build a real wheel and install it,
        # which triggers hatchling's [tool.hatch.build.targets.wheel.force-include]
        # for migrations/. Editable installs skip force-include, leaving
        # importlib.resources.files("signal_copier").joinpath("migrations/...")
        # pointing at a missing path.
        run: uv sync --frozen --no-editable
      - name: Run tests
        run: uv run pytest

  deploy:
    name: deploy to Railway
    runs-on: ubuntu-latest
    needs: [test]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --project "${{ vars.RAILWAY_PROJECT_ID }}" \
            --service "${{ vars.RAILWAY_SERVICE_ID }}" \
            --environment production \
            --detach
