[project]
name = "signal-copier"
version = "0.1.0"
description = "Telegram → OlympTrade signal copier (demo only, v1)"
readme = "README.md"
requires-python = ">=3.13"
license = { text = "Proprietary" }
authors = [{ name = "Owner" }]
dependencies = [
    # Staged: M0 ships zero runtime deps. See PRD §5.
]

[project.scripts]
signal-copier = "signal_copier.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/signal_copier"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "ruff>=0.7",
    "mypy>=1.13",
    "pre-commit>=4.0",
]

[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = ["src/olymptrade_ws", "OlympTradeAPI"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
strict = true
python_version = "3.13"
exclude = ["src/olymptrade_ws"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra --strict-markers --ignore=OlympTradeAPI"
